name: Fix Release Title
on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  fix_title:
    runs-on: ubuntu-latest
    steps:
      - name: Strip leading v from release name
        uses: "actions/github-script@v8" # yamllint disable-line rule:quoted-strings
        with:
          script: |
            const release = context.payload.release;
            if (!release) {
              core.info('No release in payload, nothing to do.');
              return;
            }
            const tag = release.tag_name || '';
            const newName = tag.startsWith('v') ? tag.slice(1) : tag;
            if ((release.name || '') === newName) {
              core.info('Release name already correct.');
              return;
            }
            core.info(`Updating release #${release.id} name to '${newName}'`);
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: newName,
              body: release.body,
              draft: release.draft,
              prerelease: release.prerelease
            });
